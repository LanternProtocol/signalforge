name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  repository-baseline:
    name: Repository baseline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required baseline files
        shell: bash
        run: |
          set -euo pipefail
          required_files=(
            README.md
            SECURITY.md
            CONTRIBUTING.md
            ROADMAP.md
            CHANGELOG.md
            LICENSE
            NOTICE
            docs/protocol-overview.md
            docs/architecture.md
            docs/threat-model.md
            docs/decisions/ADR-0001-repository-purpose.md
            docs/decisions/ADR-0002-schema-representation.md
            docs/rfcs/0001-signal-envelope.md
            docs/rfcs/0002-canonical-payload-hashing-timestamps-replay.md
            schemas/signal-envelope.schema.json
            pyproject.toml
            src/signalforge/__init__.py
            src/signalforge/envelope.py
            scripts/validate_vectors.py
            .github/CODEOWNERS
            .github/dependabot.yml
          )

          for file in "${required_files[@]}"; do
            test -f "$file" || { echo "Missing required file: $file"; exit 1; }
          done

      - name: Check Markdown files are non-empty
        shell: bash
        run: |
          set -euo pipefail
          find . -name "*.md" -not -path "./.git/*" -print0 | while IFS= read -r -d '' file; do
            test -s "$file" || { echo "Empty Markdown file: $file"; exit 1; }
          done

  python-validation:
    name: Python validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Install package and dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Validate vectors
        run: python scripts/validate_vectors.py

      - name: Run tests
        run: pytest
