name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  repository-baseline:
    name: Repository baseline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required baseline files
        shell: bash
        run: |
          set -euo pipefail
          required_files=(
            README.md
            SECURITY.md
            CONTRIBUTING.md
            ROADMAP.md
            CHANGELOG.md
            docs/protocol-overview.md
            docs/architecture.md
            docs/threat-model.md
            docs/decisions/ADR-0001-repository-purpose.md
            .github/CODEOWNERS
            .github/dependabot.yml
          )

          for file in "${required_files[@]}"; do
            test -f "$file" || { echo "Missing required file: $file"; exit 1; }
          done

      - name: Check Markdown files are non-empty
        shell: bash
        run: |
          set -euo pipefail
          find . -name "*.md" -not -path "./.git/*" -print0 | while IFS= read -r -d '' file; do
            test -s "$file" || { echo "Empty Markdown file: $file"; exit 1; }
          done
